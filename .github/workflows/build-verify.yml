# Zip Captions — Build Verification: All Platforms
# Manually triggered or on PRs to main/develop.
# Verifies that zip_captions compiles on all target platforms.
# All action versions pinned to specific patches (SECURITY-10).

name: Build Verify

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "packages/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - "melos.yaml"
      - ".github/workflows/build-verify.yml"

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.38.7"

jobs:
  build-android:
    name: Android APK (debug)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Setup Java (Android SDK)
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Restore pub-cache
        uses: actions/cache@v5.0.4
        with:
          path: ~/.pub-cache
          key: pub-cache-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            pub-cache-${{ runner.os }}-

      - name: Get dependencies
        run: flutter pub get
        working-directory: packages/zip_captions

      - name: Build Android APK
        run: flutter build apk --debug
        working-directory: packages/zip_captions

  build-ios:
    name: iOS (no codesign)
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Restore pub-cache
        uses: actions/cache@v5.0.4
        with:
          path: ~/.pub-cache
          key: pub-cache-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            pub-cache-${{ runner.os }}-

      - name: Get dependencies
        run: flutter pub get
        working-directory: packages/zip_captions

      - name: Build iOS (no codesign)
        run: flutter build ios --no-codesign
        working-directory: packages/zip_captions

  build-macos:
    name: macOS
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Restore pub-cache
        uses: actions/cache@v5.0.4
        with:
          path: ~/.pub-cache
          key: pub-cache-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            pub-cache-${{ runner.os }}-

      - name: Get dependencies
        run: flutter pub get
        working-directory: packages/zip_captions

      - name: Build macOS
        run: flutter build macos
        working-directory: packages/zip_captions

  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Restore pub-cache
        uses: actions/cache@v5.0.4
        with:
          path: ~/.pub-cache
          key: pub-cache-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            pub-cache-${{ runner.os }}-

      - name: Get dependencies
        run: flutter pub get
        working-directory: packages/zip_captions

      - name: Build Linux
        run: flutter build linux
        working-directory: packages/zip_captions

  build-windows:
    name: Windows
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Restore pub-cache
        uses: actions/cache@v5.0.4
        with:
          path: ~/.pub-cache
          key: pub-cache-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            pub-cache-${{ runner.os }}-

      - name: Get dependencies
        run: flutter pub get
        working-directory: packages/zip_captions

      - name: Build Windows
        run: flutter build windows
        working-directory: packages/zip_captions
